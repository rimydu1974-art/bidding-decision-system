<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 120" width="880" height="240">
  <defs>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="check" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="word" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Icon: checklist card as "O" -->
  <rect x="10" y="10" width="100" height="100" rx="26" fill="none" stroke="url(#frame)" stroke-width="2.5"/>
  <rect x="20" y="20" width="80" height="80" rx="19" fill="none" stroke="url(#frame)" stroke-width="0.6" opacity="0.25"/>

  <!-- Checkmark -->
  <polyline points="38,62 56,82 84,48" fill="none" stroke="url(#check)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Check tip dot -->
  <circle cx="84" cy="48" r="3" fill="#22D3EE"/>

  <!-- Wordmark -->
  <text x="140" y="68" font-family="'Inter', 'Helvetica Neue', 'Arial Black', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="900" letter-spacing="-0.8" fill="url(#word)">OpenCheck</text>

  <!-- Tagline -->
  <text x="142" y="88" font-family="'Inter', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="500" letter-spacing="1.2" fill="#8B9BB4">BID DECISION OS</text>
</svg>
